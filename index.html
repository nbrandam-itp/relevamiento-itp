<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Relevamiento · Intertropico</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'DM Sans',sans-serif}
:root{--brand:#1A3C5C;--accent:#E8500A;--radius:12px;--safe-bottom:env(safe-area-inset-bottom,16px)}
/* PIN LOCK */
#lock{position:fixed;inset:0;background:var(--brand);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}
.lock-logo{font-size:52px;margin-bottom:16px}
.lock-title{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px}
.lock-sub{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:40px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:36px}
.pd{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.35);background:transparent;transition:all .15s}
.pd.on{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:264px}
.pk{height:70px;border:none;border-radius:var(--radius);background:rgba(255,255,255,.1);color:#fff;font-size:24px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .1s;display:flex;align-items:center;justify-content:center}
.pk:active{background:rgba(255,255,255,.25);transform:scale(.96)}
.pk.del{font-size:18px}
.pin-err{color:#FCA5A5;font-size:13px;font-weight:600;margin-top:18px;opacity:0;transition:opacity .3s;height:20px}
.pin-err.show{opacity:1}
/* LOADER */
#loader{position:fixed;inset:0;background:var(--brand);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#loader.show{display:flex}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:rgba(255,255,255,.7);font-size:13px}
/* UPDATE BANNER */
#upd{position:fixed;bottom:calc(16px + var(--safe-bottom));left:50%;transform:translateX(-50%);background:#1D4ED8;color:#fff;padding:12px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:9997;display:none;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.25);white-space:nowrap}
#upd.show{display:flex}
.upd-btn{background:#fff;color:#1D4ED8;border:none;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<!-- PIN LOCK -->
<div id="lock">
  <div class="lock-logo">&#x1F9C9;</div>
  <div class="lock-title">Intertropico &middot; Campo</div>
  <div class="lock-sub">Ingres&aacute; tu PIN para continuar</div>
  <div class="pin-dots">
    <div class="pd" id="pd0"></div>
    <div class="pd" id="pd1"></div>
    <div class="pd" id="pd2"></div>
    <div class="pd" id="pd3"></div>
  </div>
  <div class="pin-pad">
    <button class="pk" onclick="pk('1')">1</button>
    <button class="pk" onclick="pk('2')">2</button>
    <button class="pk" onclick="pk('3')">3</button>
    <button class="pk" onclick="pk('4')">4</button>
    <button class="pk" onclick="pk('5')">5</button>
    <button class="pk" onclick="pk('6')">6</button>
    <button class="pk" onclick="pk('7')">7</button>
    <button class="pk" onclick="pk('8')">8</button>
    <button class="pk" onclick="pk('9')">9</button>
    <div></div>
    <button class="pk" onclick="pk('0')">0</button>
    <button class="pk del" onclick="pd()">&#x232B;</button>
  </div>
  <div class="pin-err" id="pin-err">PIN incorrecto &mdash; intent&aacute; de nuevo</div>
</div>

<!-- LOADER -->
<div id="loader">
  <div class="spin"></div>
  <div class="load-txt">Cargando app...</div>
</div>

<!-- UPDATE BANNER -->
<div id="upd">
  &#x1F4F2; Nueva versi&oacute;n disponible
  <button class="upd-btn" onclick="location.reload(true)">Actualizar</button>
</div>

<script>
// ── PIN CONFIG (solo cambiar aqui) ──
const PIN = ['1','4','2','5'].join('');
const APP_JS  = 'https://nbrandam-itp.github.io/relevamiento-itp/app.js';
const VER_URL = 'https://nbrandam-itp.github.io/relevamiento-itp/version.json';
const SES_KEY = 'itp_auth_v1';

let buf = '';

function pk(d) {
  if (buf.length >= 4) return;
  buf += d;
  updateDots();
  if (buf.length === 4) setTimeout(verify, 150);
}

function pd() {
  buf = buf.slice(0, -1);
  updateDots();
}

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('pd' + i).className = 'pd' + (i < buf.length ? ' on' : '');
  }
}

function verify() {
  if (buf === PIN) {
    sessionStorage.setItem(SES_KEY, 'ok');
    document.getElementById('lock').style.display = 'none';
    loadApp();
  } else {
    const err = document.getElementById('pin-err');
    err.classList.add('show');
    buf = '';
    updateDots();
    // Shake animation
    const lock = document.getElementById('lock');
    lock.style.animation = 'none';
    setTimeout(() => { lock.style.animation = ''; err.classList.remove('show'); }, 1800);
  }
}

function loadApp() {
  const loader = document.getElementById('loader');
  loader.classList.add('show');
  const s = document.createElement('script');
  s.src = APP_JS + '?v=' + Date.now(); // cache bust
  s.onload = () => loader.classList.remove('show');
  s.onerror = () => {
    loader.innerHTML = '<div style="color:#FCA5A5;text-align:center;padding:20px"><div style="font-size:32px;margin-bottom:12px">&#x26A0;&#xFE0F;</div><div style="font-size:14px;font-weight:600;color:#fff">Sin conexi&oacute;n</div><div style="font-size:12px;margin-top:6px;color:rgba(255,255,255,.6)">Verific&aacute; tu internet e intent&aacute; de nuevo</div><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Reintentar</button></div>';
  };
  document.head.appendChild(s);
  checkVersion();
}

async function checkVersion() {
  try {
    const r = await fetch(VER_URL + '?t=' + Date.now());
    const d = await r.json();
    // Version check happens inside app.js once loaded
    window._latestVersion = d.version;
  } catch(e) {}
}

// Auto-login if session active
if (sessionStorage.getItem(SES_KEY) === 'ok') {
  document.getElementById('lock').style.display = 'none';
  loadApp();
}
</script>
</body>
</html>
